services:
  web:
    environment:
      RAILS_ENV: development
    ports:
      - "3000:80"
    volumes:
      - .:/usr/src/app
    depends_on:
      - postgres
      - redis
  jobs:
    environment:
      RAILS_ENV: development
    volumes:
      - .:/usr/src/app
    depends_on:
      - postgres
      - redis
  postgres:
    ports:
      - "5432:5432"
  redis:
    ports:
      - "6379:6379"